<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <g stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.35">
    <!-- Horizontal traces -->
    <line x1="0" y1="40" x2="80" y2="40"/>
    <line x1="120" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="100" x2="60" y2="100"/>
    <line x1="100" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="160" x2="40" y2="160"/>
    <line x1="80" y1="160" x2="140" y2="160"/>
    <line x1="160" y1="160" x2="200" y2="160"/>
    <!-- Vertical traces -->
    <line x1="80" y1="0" x2="80" y2="40"/>
    <line x1="80" y1="60" x2="80" y2="100"/>
    <line x1="40" y1="0" x2="40" y2="40"/>
    <line x1="40" y1="60" x2="40" y2="160"/>
    <line x1="160" y1="40" x2="160" y2="100"/>
    <line x1="160" y1="120" x2="160" y2="160"/>
    <line x1="120" y1="0" x2="120" y2="40"/>
    <line x1="120" y1="60" x2="120" y2="100"/>
    <line x1="100" y1="100" x2="100" y2="200"/>
    <!-- L-joints -->
    <line x1="80" y1="40" x2="80" y2="60"/>
    <line x1="80" y1="60" x2="120" y2="60"/>
    <line x1="120" y1="60" x2="120" y2="40"/>
    <!-- Solder pads (intersection dots) -->
    <rect x="38" y="38" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="78" y="38" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="118" y="38" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="158" y="38" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="38" y="98" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="98" y="98" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="158" y="98" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="38" y="158" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="78" y="158" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="138" y="158" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
    <rect x="158" y="158" width="4" height="4" fill="#00d4ff" opacity="0.5"/>
  </g>
</svg>
